name: Monthly Job Hub Credits Grant

on:
  # Runs at 08:00 WAT (07:00 UTC) on the 1st of every month
  schedule:
    - cron: '0 7 1 * *'
  # Allow manual trigger from the Actions tab for testing
  workflow_dispatch:

jobs:
  grant-credits:
    name: Grant monthly credits to all learners
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call monthly-grant endpoint
        env:
          API_URL:     ${{ secrets.API_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "Calling monthly grant endpoint..."
          response=$(curl -s -w "\n%{http_code}" \
            -X POST "${API_URL}/jobhub/credits/cron/monthly-grant" \
            -H "x-cron-secret: ${CRON_SECRET}" \
            -H "Content-Type: application/json")

          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)

          echo "HTTP status: $status"
          echo "Response: $body"

          if [ "$status" != "200" ]; then
            echo "::error::Grant failed with status $status"
            exit 1
          fi
